<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Whoop Health Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #60a5fa;
        --ok: #34d399;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 1.4rem;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(4, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .card {
        background: var(--panel);
        border-radius: 12px;
        padding: 12px;
      }

      .label {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .value {
        margin-top: 8px;
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--ok);
      }

      .chart-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .chart-wrap {
        background: var(--panel);
        border-radius: 12px;
        padding: 12px;
      }

      .chart-title {
        margin: 0 0 8px;
        font-size: 0.95rem;
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .cards {
          grid-template-columns: repeat(2, minmax(140px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Whoop 7-Day Summary + 30-Day Trends</h1>
      <div id="cards" class="cards"></div>
      <div class="chart-grid">
        <div class="chart-wrap">
          <p class="chart-title">Recovery (30 days)</p>
          <canvas id="recoveryChart"></canvas>
        </div>
        <div class="chart-wrap">
          <p class="chart-title">Sleep Hours (30 days)</p>
          <canvas id="sleepChart"></canvas>
        </div>
        <div class="chart-wrap">
          <p class="chart-title">Strain (30 days)</p>
          <canvas id="strainChart"></canvas>
        </div>
      </div>
    </div>

    <script>
      const DATA_URL = "../data/data.json";

      function average(rows, key) {
        if (!rows.length) return 0;
        const total = rows.reduce((sum, row) => sum + (Number(row[key]) || 0), 0);
        return total / rows.length;
      }

      function fmt(value, digits = 1) {
        return Number(value || 0).toFixed(digits);
      }

      function renderCards(last7) {
        const cards = [
          { label: "Avg Recovery", value: `${fmt(average(last7, "recovery_score"), 0)}%` },
          { label: "Avg HRV", value: fmt(average(last7, "hrv"), 1) },
          { label: "Avg Sleep", value: `${fmt(average(last7, "sleep_duration_hrs"), 1)}h` },
          { label: "Avg Strain", value: fmt(average(last7, "daily_strain"), 1) },
        ];

        const root = document.getElementById("cards");
        root.innerHTML = cards
          .map(
            (card) =>
              `<div class="card"><div class="label">${card.label}</div><div class="value">${card.value}</div></div>`
          )
          .join("");
      }

      function makeChart(canvasId, labels, values, color) {
        new Chart(document.getElementById(canvasId), {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                data: values,
                borderColor: color,
                backgroundColor: color,
                borderWidth: 2,
                pointRadius: 2,
                tension: 0.25,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
            },
            scales: {
              x: {
                ticks: { color: "#9ca3af" },
                grid: { color: "rgba(148,163,184,0.15)" },
              },
              y: {
                ticks: { color: "#9ca3af" },
                grid: { color: "rgba(148,163,184,0.15)" },
              },
            },
          },
        });
      }

      async function init() {
        const res = await fetch(DATA_URL, { cache: "no-store" });
        const data = await res.json();
        const rows = Array.isArray(data) ? data : [];
        rows.sort((a, b) => String(a.date).localeCompare(String(b.date)));

        const last7 = rows.slice(-7);
        const last30 = rows.slice(-30);
        const labels = last30.map((r) => r.date);

        renderCards(last7);
        makeChart(
          "recoveryChart",
          labels,
          last30.map((r) => Number(r.recovery_score) || 0),
          "#60a5fa"
        );
        makeChart(
          "sleepChart",
          labels,
          last30.map((r) => Number(r.sleep_duration_hrs) || 0),
          "#34d399"
        );
        makeChart(
          "strainChart",
          labels,
          last30.map((r) => Number(r.daily_strain) || 0),
          "#f59e0b"
        );
      }

      init().catch((err) => {
        console.error(err);
        document.querySelector(".container").insertAdjacentHTML(
          "beforeend",
          '<p style="color:#fca5a5">Failed to load dashboard data.</p>'
        );
      });
    </script>
  </body>
</html>
