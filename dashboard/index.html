<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Whoop Health Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --panel: #111827;
        --panel2: #0f172a;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --border: rgba(148, 163, 184, 0.22);
        --rec-high: #22c55e;
        --rec-mid: #eab308;
        --rec-low: #ef4444;
        --rec-none: #475569;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(1200px 600px at 20% -10%, rgba(96, 165, 250, 0.12), transparent),
          radial-gradient(900px 500px at 90% 0%, rgba(52, 211, 153, 0.08), transparent), var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 22px 18px 40px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.45rem;
        letter-spacing: -0.02em;
      }

      .sub {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .section-title {
        margin: 22px 0 10px;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .week-panel {
        background: linear-gradient(180deg, rgba(17, 24, 39, 0.95), rgba(15, 23, 42, 0.92));
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      .week-metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: stretch;
        margin-bottom: 12px;
      }

      .metric {
        flex: 1 1 120px;
        background: rgba(2, 6, 23, 0.35);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        min-width: 0;
      }

      .metric .label {
        color: var(--muted);
        font-size: 0.78rem;
      }

      .metric .value {
        margin-top: 6px;
        font-size: 1.25rem;
        font-weight: 750;
        letter-spacing: -0.02em;
      }

      .week-strip {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
      }

      .day-cell {
        border-radius: 12px;
        padding: 10px 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        text-align: center;
        min-width: 0;
      }

      .day-cell .dow {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.72);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .day-cell .md {
        margin-top: 4px;
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.72);
      }

      .day-cell .score {
        margin-top: 10px;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      .day-cell .submetric {
        margin-top: 8px;
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.78);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chart-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .chart-wrap {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      .chart-title {
        margin: 0 0 8px;
        font-size: 0.95rem;
        color: var(--muted);
      }

      canvas {
        max-height: 260px;
      }

      @media (max-width: 820px) {
        .week-strip {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .week-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Whoop dashboard</h1>
      <p class="sub">This week at a glance · scroll for monthly trends</p>

      <div class="section-title">This week</div>
      <div class="week-panel">
        <div id="week-metrics" class="week-metrics"></div>
        <div id="week-strip" class="week-strip"></div>
      </div>

      <div class="section-title">Monthly trends</div>
      <div class="chart-grid">
        <div class="chart-wrap">
          <p class="chart-title">Recovery (30 days)</p>
          <canvas id="recoveryChart"></canvas>
        </div>
        <div class="chart-wrap">
          <p class="chart-title">Sleep hours (30 days)</p>
          <canvas id="sleepChart"></canvas>
        </div>
        <div class="chart-wrap">
          <p class="chart-title">Strain (30 days)</p>
          <canvas id="strainChart"></canvas>
        </div>
      </div>
    </div>

    <script>
      const DATA_URL = "../data/data.json";

      function recoveryBucket(score) {
        const n = Number(score);
        if (!Number.isFinite(n) || n <= 0) return "none";
        if (n >= 75) return "high";
        if (n >= 45) return "mid";
        return "low";
      }

      function recoveryCssVar(score) {
        const b = recoveryBucket(score);
        if (b === "high") return "var(--rec-high)";
        if (b === "mid") return "var(--rec-mid)";
        if (b === "low") return "var(--rec-low)";
        return "var(--rec-none)";
      }

      function recoveryHex(score) {
        const b = recoveryBucket(score);
        if (b === "high") return "#22c55e";
        if (b === "mid") return "#eab308";
        if (b === "low") return "#ef4444";
        return "#64748b";
      }

      function recoveryTextColor(score) {
        const n = Number(score);
        if (!Number.isFinite(n) || n <= 0) return "#cbd5e1";
        if (n >= 75) return "#052e16";
        if (n >= 45) return "#422006";
        return "#450a0a";
      }

      function average(rows, key) {
        if (!rows.length) return 0;
        const total = rows.reduce((sum, row) => sum + (Number(row[key]) || 0), 0);
        return total / rows.length;
      }

      function fmt(value, digits = 1) {
        return Number(value || 0).toFixed(digits);
      }

      function addDaysIso(dateStr, deltaDays) {
        const [y, m, d] = dateStr.split("-").map(Number);
        const dt = new Date(Date.UTC(y, m - 1, d));
        dt.setUTCDate(dt.getUTCDate() + deltaDays);
        const yy = dt.getUTCFullYear();
        const mm = String(dt.getUTCMonth() + 1).padStart(2, "0");
        const dd = String(dt.getUTCDate()).padStart(2, "0");
        return `${yy}-${mm}-${dd}`;
      }

      function renderWeekMetrics(last7) {
        const root = document.getElementById("week-metrics");
        const avgRec = average(last7, "recovery_score");
        const cards = [
          { label: "Avg recovery", value: `${fmt(avgRec, 0)}%`, color: recoveryCssVar(avgRec) },
          { label: "Avg HRV", value: fmt(average(last7, "hrv"), 1) },
          { label: "Avg sleep", value: `${fmt(average(last7, "sleep_duration_hrs"), 1)}h` },
          { label: "Avg strain", value: fmt(average(last7, "daily_strain"), 1) },
        ];
        root.innerHTML = cards
          .map((c) => {
            const valStyle = "color" in c ? `color:${c.color}` : "";
            return `<div class="metric"><div class="label">${c.label}</div><div class="value" style="${valStyle}">${c.value}</div></div>`;
          })
          .join("");
      }

      function renderWeekStrip(last7Dates, rowsByDate) {
        const dowShort = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const root = document.getElementById("week-strip");
        root.innerHTML = last7Dates
          .map((dateStr) => {
            const row = rowsByDate.get(dateStr) || {};
            const score = Number(row.recovery_score);
            const hasScore = Number.isFinite(score) && score > 0;
            const bg = hasScore ? recoveryCssVar(score) : "rgba(71, 85, 105, 0.35)";
            const scoreText = hasScore ? `${Math.round(score)}%` : "—";
            const textCol = hasScore ? recoveryTextColor(score) : "#cbd5e1";
            const dt = new Date(`${dateStr}T12:00:00`);
            const dow = dowShort[dt.getDay()];
            const md = `${dt.getMonth() + 1}/${dt.getDate()}`;
            const sleep = row.sleep_duration_hrs != null ? `${fmt(row.sleep_duration_hrs, 1)}h sleep` : "";
            const strain = row.daily_strain != null ? `${fmt(row.daily_strain, 1)} strain` : "";
            const sub = [sleep, strain].filter(Boolean).join(" · ");
            return `
              <div class="day-cell" style="background:${bg}; color:${hasScore ? textCol : "#e5e7eb"};">
                <div class="dow">${dow}</div>
                <div class="md">${md}</div>
                <div class="score">${scoreText}</div>
                <div class="submetric" title="${sub}">${sub || "No data"}</div>
              </div>`;
          })
          .join("");
      }

      function makeChart(canvasId, labels, values, datasetStyle = {}, options = {}) {
        const canvas = document.getElementById(canvasId);
        const baseDataset = {
          data: values,
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.25,
          ...datasetStyle,
        };
        const chartOptions = {
          responsive: true,
          plugins: {
            legend: { display: false },
          },
          scales: {
            x: {
              ticks: { color: "#9ca3af", maxRotation: 0 },
              grid: { color: "rgba(148,163,184,0.12)" },
            },
            y: {
              ticks: { color: "#9ca3af" },
              grid: { color: "rgba(148,163,184,0.12)" },
            },
          },
          ...options,
        };

        if (canvas.__chart) {
          canvas.__chart.destroy();
        }
        canvas.__chart = new Chart(canvas, {
          type: "line",
          data: {
            labels,
            datasets: [baseDataset],
          },
          options: chartOptions,
        });
      }

      async function init() {
        const res = await fetch(DATA_URL, { cache: "no-store" });
        const data = await res.json();
        const rows = Array.isArray(data) ? data : [];
        rows.sort((a, b) => String(a.date).localeCompare(String(b.date)));

        const rowsByDate = new Map(rows.map((r) => [String(r.date), r]));
        const lastDate = rows.length ? String(rows[rows.length - 1].date) : new Date().toISOString().slice(0, 10);
        const last7Dates = Array.from({ length: 7 }, (_, i) => addDaysIso(lastDate, -6 + i));
        const last7Rows = last7Dates.map((d) => rowsByDate.get(d)).filter(Boolean);

        renderWeekMetrics(last7Rows.length ? last7Rows : rows.slice(-7));
        renderWeekStrip(last7Dates, rowsByDate);

        const last30 = rows.slice(-30);
        const labels = last30.map((r) => r.date);
        const recoveryVals = last30.map((r) => Number(r.recovery_score) || 0);

        const recoveryCanvas = document.getElementById("recoveryChart");
        if (recoveryCanvas.__chart) recoveryCanvas.__chart.destroy();
        recoveryCanvas.__chart = new Chart(recoveryCanvas, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                data: recoveryVals,
                segment: {
                  borderColor: (ctx) => recoveryHex(ctx.p1.parsed.y ?? 0),
                },
                borderWidth: 2,
                pointBackgroundColor: recoveryVals.map((v) => recoveryHex(v)),
                pointBorderColor: "rgba(15,23,42,0.9)",
                pointRadius: 3,
                tension: 0.25,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                ticks: { color: "#9ca3af", maxRotation: 0 },
                grid: { color: "rgba(148,163,184,0.12)" },
              },
              y: {
                suggestedMin: 0,
                suggestedMax: 100,
                ticks: { color: "#9ca3af" },
                grid: { color: "rgba(148,163,184,0.12)" },
              },
            },
          },
        });

        makeChart(
          "sleepChart",
          labels,
          last30.map((r) => Number(r.sleep_duration_hrs) || 0),
          {
            borderColor: "#34d399",
            backgroundColor: "#34d399",
            pointBackgroundColor: "#34d399",
          }
        );

        makeChart(
          "strainChart",
          labels,
          last30.map((r) => Number(r.daily_strain) || 0),
          {
            borderColor: "#f59e0b",
            backgroundColor: "#f59e0b",
            pointBackgroundColor: "#f59e0b",
          }
        );
      }

      init().catch((err) => {
        console.error(err);
        document.querySelector(".container").insertAdjacentHTML(
          "beforeend",
          '<p style="color:#fca5a5;margin-top:14px">Failed to load dashboard data.</p>'
        );
      });
    </script>
  </body>
</html>
