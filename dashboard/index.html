<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Whoop Health Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        /* Notion-like light (matches embedded page / default UI) */
        --bg: #f7f6f3;
        --surface: #ffffff;
        --text: #37352f;
        --muted: rgba(55, 53, 47, 0.65);
        --border: rgba(55, 53, 47, 0.09);
        --shadow: rgba(15, 15, 15, 0.05) 0px 1px 0px;
        --chart-tick: rgba(55, 53, 47, 0.5);
        --chart-grid: rgba(55, 53, 47, 0.07);
        --rec-high: #34d399;
        --rec-mid: #fbbf24;
        --rec-low: #fb7185;
        --rec-none: #cbd5e1;
        --tile-high-bg: #ecfdf5;
        --tile-high-text: #065f46;
        --tile-high-border: rgba(52, 211, 153, 0.55);
        --tile-mid-bg: #fffbeb;
        --tile-mid-text: #92400e;
        --tile-mid-border: rgba(251, 191, 36, 0.55);
        --tile-low-bg: #fff1f2;
        --tile-low-text: #9f1239;
        --tile-low-border: rgba(251, 113, 133, 0.55);
        --tile-none-bg: rgba(55, 53, 47, 0.06);
        --tile-none-text: rgba(55, 53, 47, 0.5);
        --tile-none-border: rgba(55, 53, 47, 0.09);
        --sleep-high-bg: #f0fdfa;
        --sleep-high-text: #0f766e;
        --sleep-high-border: rgba(13, 148, 136, 0.45);
        --sleep-mid-bg: #fffbeb;
        --sleep-mid-text: #b45309;
        --sleep-mid-border: rgba(251, 191, 36, 0.45);
        --sleep-low-bg: #fff1f2;
        --sleep-low-text: #be123c;
        --sleep-low-border: rgba(251, 113, 133, 0.45);
        --sleep-none-bg: rgba(55, 53, 47, 0.06);
        --sleep-none-text: rgba(55, 53, 47, 0.5);
        --sleep-none-border: rgba(55, 53, 47, 0.09);
        /* sleep hours line chart — teal / amber / rose (distinct from recovery greens) */
        --sleep-chart-high: #0d9488;
        --sleep-chart-mid: #f59e0b;
        --sleep-chart-low: #e11d48;
        --sleep-chart-none: #9b9a97;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #191919;
          --surface: #202020;
          --text: rgba(255, 255, 255, 0.81);
          --muted: rgba(255, 255, 255, 0.43);
          --border: rgba(255, 255, 255, 0.09);
          --shadow: rgba(0, 0, 0, 0.4) 0px 1px 0px;
          --chart-tick: rgba(255, 255, 255, 0.45);
          --chart-grid: rgba(255, 255, 255, 0.07);
          --tile-none-bg: rgba(255, 255, 255, 0.06);
          --tile-none-text: rgba(255, 255, 255, 0.45);
          --tile-none-border: rgba(255, 255, 255, 0.09);
          --sleep-none-bg: rgba(255, 255, 255, 0.06);
          --sleep-none-text: rgba(255, 255, 255, 0.45);
          --sleep-none-border: rgba(255, 255, 255, 0.09);
          --sleep-chart-none: rgba(255, 255, 255, 0.35);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji",
          Arial, sans-serif;
      }

      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 26px 18px 44px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.55rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--text);
      }

      .section-title {
        margin: 22px 0 10px;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .week-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .week-avg-heading {
        margin: 0 0 10px;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-transform: lowercase;
      }

      .week-metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: stretch;
        margin-bottom: 16px;
      }

      .metric {
        flex: 1 1 100px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 14px;
        min-width: 0;
        text-align: center;
      }

      .metric .label {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--muted);
        text-transform: lowercase;
        margin-bottom: 6px;
      }

      .metric .value {
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: var(--text);
      }

      .week-strip {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 10px;
      }

      .day-cell {
        border-radius: 6px;
        padding: 12px 8px;
        text-align: center;
        min-width: 0;
        border: 1px solid var(--tile-none-border);
        background: var(--surface);
        color: var(--text);
      }

      .day-cell .dow {
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: lowercase;
        opacity: 0.85;
        color: var(--muted);
      }

      .day-cell .md {
        margin-top: 4px;
        font-size: 0.78rem;
        font-weight: 700;
        opacity: 0.88;
        color: var(--muted);
      }

      .day-cell-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        align-items: center;
        margin-top: 10px;
      }

      .chip {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        padding: 5px 9px;
        border-radius: 999px;
        border: 1px solid transparent;
        line-height: 1.2;
      }

      .chip-rec--high {
        background: var(--tile-high-bg);
        color: var(--tile-high-text);
        border-color: var(--tile-high-border);
      }

      .chip-rec--mid {
        background: var(--tile-mid-bg);
        color: var(--tile-mid-text);
        border-color: var(--tile-mid-border);
      }

      .chip-rec--low {
        background: var(--tile-low-bg);
        color: var(--tile-low-text);
        border-color: var(--tile-low-border);
      }

      .chip-rec--none {
        background: var(--tile-none-bg);
        color: var(--tile-none-text);
        border-color: var(--tile-none-border);
      }

      .chip-sleep--high {
        background: var(--sleep-high-bg);
        color: var(--sleep-high-text);
        border-color: var(--sleep-high-border);
      }

      .chip-sleep--mid {
        background: var(--sleep-mid-bg);
        color: var(--sleep-mid-text);
        border-color: var(--sleep-mid-border);
      }

      .chip-sleep--low {
        background: var(--sleep-low-bg);
        color: var(--sleep-low-text);
        border-color: var(--sleep-low-border);
      }

      .chip-sleep--none {
        background: var(--sleep-none-bg);
        color: var(--sleep-none-text);
        border-color: var(--sleep-none-border);
      }

      .day-cell .submetric {
        margin-top: 8px;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chart-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .chart-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .chart-title {
        margin: 0 0 10px;
        font-size: 0.98rem;
        font-weight: 600;
        color: var(--text);
        text-transform: lowercase;
      }

      canvas {
        max-height: 260px;
      }

      @media (max-width: 820px) {
        .week-strip {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .week-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>whoop dashboard</h1>

      <div class="section-title">This week</div>
      <div class="week-panel">
        <div id="week-avg-wrap"></div>
        <div id="week-strip" class="week-strip"></div>
      </div>

      <div class="section-title">Monthly trends</div>
      <div class="chart-grid">
        <div class="chart-wrap">
          <p class="chart-title">recovery · last 30 days</p>
          <canvas id="recoveryChart"></canvas>
        </div>
        <div class="chart-wrap">
          <p class="chart-title">sleep · last 30 days</p>
          <canvas id="sleepChart"></canvas>
        </div>
        <div class="chart-wrap">
          <p class="chart-title">strain · last 30 days</p>
          <canvas id="strainChart"></canvas>
        </div>
      </div>
    </div>

    <script>
      const DATA_URL = "../data/data.json";

      function chartScaleColors() {
        const s = getComputedStyle(document.documentElement);
        return {
          tick: s.getPropertyValue("--chart-tick").trim(),
          grid: s.getPropertyValue("--chart-grid").trim(),
        };
      }

      function recoveryBucket(score) {
        const n = Number(score);
        if (!Number.isFinite(n) || n <= 0) return "none";
        if (n >= 75) return "high";
        if (n >= 45) return "mid";
        return "low";
      }

      function recoveryCssVar(score) {
        const b = recoveryBucket(score);
        if (b === "high") return "var(--rec-high)";
        if (b === "mid") return "var(--rec-mid)";
        if (b === "low") return "var(--rec-low)";
        return "var(--rec-none)";
      }

      function recoveryHex(score) {
        const b = recoveryBucket(score);
        if (b === "high") return "#34d399";
        if (b === "mid") return "#fbbf24";
        if (b === "low") return "#fb7185";
        return "#cbd5e1";
      }

      function sleepBucket(hrs) {
        const n = Number(hrs);
        if (!Number.isFinite(n) || n <= 0) return "none";
        if (n >= 8) return "high";
        if (n >= 6) return "mid";
        return "low";
      }

      function sleepCssVar(hrs) {
        const b = sleepBucket(hrs);
        if (b === "high") return "var(--sleep-high-text)";
        if (b === "mid") return "var(--sleep-mid-text)";
        if (b === "low") return "var(--sleep-low-text)";
        return "var(--sleep-none-text)";
      }

      function sleepHex(hrs) {
        const b = sleepBucket(hrs);
        if (b === "high") return "#0d9488";
        if (b === "mid") return "#f59e0b";
        if (b === "low") return "#e11d48";
        return "#9b9a97";
      }

      function weekdayUtc(isoDateStr) {
        const [y, m, d] = isoDateStr.split("-").map(Number);
        const dt = new Date(Date.UTC(y, m - 1, d));
        return dt.getUTCDay();
      }

      function mondayStartIso(isoDateStr) {
        const dow = weekdayUtc(isoDateStr);
        const daysFromMonday = dow === 0 ? 6 : dow - 1;
        return addDaysIso(isoDateStr, -daysFromMonday);
      }

      function average(rows, key) {
        if (!rows.length) return 0;
        const total = rows.reduce((sum, row) => sum + (Number(row[key]) || 0), 0);
        return total / rows.length;
      }

      function fmt(value, digits = 1) {
        return Number(value || 0).toFixed(digits);
      }

      function addDaysIso(dateStr, deltaDays) {
        const [y, m, d] = dateStr.split("-").map(Number);
        const dt = new Date(Date.UTC(y, m - 1, d));
        dt.setUTCDate(dt.getUTCDate() + deltaDays);
        const yy = dt.getUTCFullYear();
        const mm = String(dt.getUTCMonth() + 1).padStart(2, "0");
        const dd = String(dt.getUTCDate()).padStart(2, "0");
        return `${yy}-${mm}-${dd}`;
      }

      function renderWeekAvg(weekRows) {
        const root = document.getElementById("week-avg-wrap");
        const avgRec = average(weekRows, "recovery_score");
        const avgSleep = average(weekRows, "sleep_duration_hrs");
        const avgStrain = average(weekRows, "daily_strain");
        const cards = [
          { label: "recovery", value: `${fmt(avgRec, 0)}%`, color: recoveryCssVar(avgRec) },
          { label: "sleep", value: `${fmt(avgSleep, 1)}h`, color: sleepCssVar(avgSleep) },
          { label: "strain", value: fmt(avgStrain, 1), color: "" },
        ];
        root.innerHTML = `
          <div class="week-avg-heading">average</div>
          <div class="week-metrics">
            ${cards
              .map((c) => {
                const valStyle = c.color ? `color:${c.color}` : "";
                return `<div class="metric"><div class="label">${c.label}</div><div class="value" style="${valStyle}">${c.value}</div></div>`;
              })
              .join("")}
          </div>`;
      }

      function renderWeekStrip(weekDates, rowsByDate) {
        const dowShort = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
        const root = document.getElementById("week-strip");
        root.innerHTML = weekDates
          .map((dateStr) => {
            const row = rowsByDate.get(dateStr) || {};
            const score = Number(row.recovery_score);
            const hasScore = Number.isFinite(score) && score > 0;
            const recBucket = hasScore ? recoveryBucket(score) : "none";
            const recCls = `chip-rec--${recBucket}`;
            const scoreText = hasScore ? `${Math.round(score)}%` : "—";

            const sleepHrs = Number(row.sleep_duration_hrs);
            const hasSleep = Number.isFinite(sleepHrs) && sleepHrs > 0;
            const sleepB = hasSleep ? sleepBucket(sleepHrs) : "none";
            const sleepCls = `chip-sleep--${sleepB}`;
            const sleepText = hasSleep ? `${fmt(sleepHrs, 1)}h` : "—";

            const dow = dowShort[weekdayUtc(dateStr)];
            const [, mm, dd] = dateStr.split("-");
            const mdLabel = `${Number(mm)}/${Number(dd)}`;

            const strain =
              row.daily_strain != null ? `${fmt(row.daily_strain, 1)} strain` : "";
            const sub = strain || "no data";

            return `
              <div class="day-cell">
                <div class="dow">${dow}</div>
                <div class="md">${mdLabel}</div>
                <div class="day-cell-chips">
                  <span class="chip ${recCls}">${scoreText}</span>
                  <span class="chip ${sleepCls}">${sleepText}</span>
                </div>
                <div class="submetric" title="${strain}">${sub}</div>
              </div>`;
          })
          .join("");
      }

      function makeChart(canvasId, labels, values, datasetStyle = {}, options = {}, sc = chartScaleColors()) {
        const canvas = document.getElementById(canvasId);
        const baseDataset = {
          data: values,
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.25,
          ...datasetStyle,
        };
        const chartOptions = {
          responsive: true,
          plugins: {
            legend: { display: false },
          },
          scales: {
            x: {
              ticks: { color: sc.tick, maxRotation: 0 },
              grid: { color: sc.grid },
            },
            y: {
              ticks: { color: sc.tick },
              grid: { color: sc.grid },
            },
          },
          ...options,
        };

        if (canvas.__chart) {
          canvas.__chart.destroy();
        }
        canvas.__chart = new Chart(canvas, {
          type: "line",
          data: {
            labels,
            datasets: [baseDataset],
          },
          options: chartOptions,
        });
      }

      async function init() {
        const res = await fetch(DATA_URL, { cache: "no-store" });
        const data = await res.json();
        const rows = Array.isArray(data) ? data : [];
        rows.sort((a, b) => String(a.date).localeCompare(String(b.date)));

        const rowsByDate = new Map(rows.map((r) => [String(r.date), r]));
        const lastDate = rows.length ? String(rows[rows.length - 1].date) : new Date().toISOString().slice(0, 10);
        const monday = mondayStartIso(lastDate);
        const weekDates = Array.from({ length: 7 }, (_, i) => addDaysIso(monday, i));
        const weekRows = weekDates.map((d) => rowsByDate.get(d)).filter(Boolean);

        renderWeekAvg(weekRows.length ? weekRows : rows.slice(-7));
        renderWeekStrip(weekDates, rowsByDate);

        const cs = chartScaleColors();

        const last30 = rows.slice(-30);
        const labels = last30.map((r) => r.date);
        const recoveryVals = last30.map((r) => Number(r.recovery_score) || 0);

        const recoveryCanvas = document.getElementById("recoveryChart");
        if (recoveryCanvas.__chart) recoveryCanvas.__chart.destroy();
        recoveryCanvas.__chart = new Chart(recoveryCanvas, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                data: recoveryVals,
                segment: {
                  borderColor: (ctx) => recoveryHex(ctx.p1.parsed.y ?? 0),
                },
                borderWidth: 2,
                pointBackgroundColor: recoveryVals.map((v) => recoveryHex(v)),
                pointBorderColor: "#ffffff",
                pointRadius: 4,
                tension: 0.25,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                ticks: { color: cs.tick, maxRotation: 0 },
                grid: { color: cs.grid },
              },
              y: {
                suggestedMin: 0,
                suggestedMax: 100,
                ticks: { color: cs.tick },
                grid: { color: cs.grid },
              },
            },
          },
        });

        const sleepVals = last30.map((r) => Number(r.sleep_duration_hrs) || 0);
        const sleepCanvas = document.getElementById("sleepChart");
        if (sleepCanvas.__chart) sleepCanvas.__chart.destroy();
        sleepCanvas.__chart = new Chart(sleepCanvas, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                data: sleepVals,
                segment: {
                  borderColor: (ctx) => sleepHex(ctx.p1.parsed.y ?? 0),
                },
                borderWidth: 2,
                pointBackgroundColor: sleepVals.map((v) => sleepHex(v)),
                pointBorderColor: "#ffffff",
                pointRadius: 4,
                tension: 0.25,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                ticks: { color: cs.tick, maxRotation: 0 },
                grid: { color: cs.grid },
              },
              y: {
                suggestedMin: 0,
                ticks: { color: cs.tick },
                grid: { color: cs.grid },
              },
            },
          },
        });

        makeChart(
          "strainChart",
          labels,
          last30.map((r) => Number(r.daily_strain) || 0),
          {
            borderColor: "#fb923c",
            backgroundColor: "#fb923c",
            pointBackgroundColor: "#fb923c",
          },
          {},
          cs
        );
      }

      init().catch((err) => {
        console.error(err);
        document.querySelector(".container").insertAdjacentHTML(
          "beforeend",
          '<p style="color:#e11d48;margin-top:14px;font-weight:700">failed to load dashboard data.</p>'
        );
      });
    </script>
  </body>
</html>
